<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2C2013">
<title>PitchTrainer</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Saira+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6S166VVNEM"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-6S166VVNEM');
</script>
</head>
<body>
<header>
  <span class="led"></span>
  <h1>PitchTrainer</h1>
  <span class="sub">vocal pitch trainer</span>
</header>

<main>
  <!-- HERO: strobe tuner. Live the moment the mic is on before any drill -->
  <div class="brushed hero">
    <div class="hero-row">
      <span class="eyebrow">Tuner</span>
      <span class="eyebrow mic-state-row" style="margin-left:auto">
        <span class="rled" id="micLed"></span>
        <span id="micStateText">mic off</span>
      </span>
      <button id="micBtn">Enable mic</button>
    </div>
    <div class="face">
      <div class="note" id="liveNote">—</div>
      <div class="readout" id="liveCents">enable mic to begin</div>
      <div class="strobe">
        <span class="sym" id="flatSym">&#9837;</span>
        <div class="track">
          <div class="rule"></div>
          <div class="tick" style="left:25%"></div>
          <div class="detent"></div>
          <div class="tick" style="left:75%"></div>
          <div class="needle" id="liveFill"></div>
        </div>
        <span class="sym" id="sharpSym">&#9839;</span>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="brushed controls">
    <div class="row">
      <label>Drill
        <select id="drillSel"></select>
      </label>
      <label>Tonic (do)
        <select id="tonicSel"></select>
      </label>
      <label>Tolerance (± cents)
        <div class="knob-group" id="tolKnob">
          <canvas width="72" height="72" tabindex="0"></canvas>
          <div class="knob-val">50 ¢</div>
        </div>
      </label>
      <label>Tempo
        <div class="knob-group" id="tempoKnob">
          <canvas width="72" height="72" tabindex="0"></canvas>
          <div class="knob-val" id="tempoVal">1.0×</div>
        </div>
      </label>
      <div style="display:flex;flex-direction:column;gap:8px;align-self:flex-end">
        <label class="toggle hw-toggle">
          <span class="sw"><input type="checkbox" id="concurrentChk"><span class="sw-track"><span class="sw-thumb"></span></span></span>
          live line while singing
        </label>
        <label class="toggle hw-toggle">
          <span class="sw"><input type="checkbox" id="playheadChk"><span class="sw-track"><span class="sw-thumb"></span></span></span>
          playhead (timing guide)
        </label>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-self:flex-end">
        <button id="startBtn" disabled>Start drill</button>
        <button id="stopBtn" class="ghost" disabled>Stop</button>
      </div>
    </div>
    <div class="hint">Target plays on the grid → count-in → sing it back → score shown after&nbsp;</div>
  </div>

  <!-- VIZ -->
  <div class="brushed viz">
    <div class="status" id="status">idle</div>
    <div class="screen"><canvas id="plot" width="940" height="200"></canvas></div>
  </div>

  <!-- SCORE -->
  <div class="brushed score" id="scorePanel" style="display:none">
    <table id="scoreTable">
      <thead><tr><th></th><th>note</th><th>target</th><th>landed</th><th>hold in band</th><th>hold mean dev</th><th>hold drift</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- HISTORY -->
  <div class="brushed history" id="historyPanel">
    <div class="history-head">
      <span class="eyebrow">History</span>
      <button id="clearHistBtn" class="ghost">Clear history</button>
    </div>
    <div id="historyList"></div>
  </div>
</main>

<script type="module" src="src/main.js"></script>
<footer style="text-align:center;padding:1rem;font-size:0.75rem;opacity:0.45">
  This site uses Google Analytics for anonymous visitor analytics.
</footer>
</body>
</html>
